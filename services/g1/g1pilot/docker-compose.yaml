version: "3.9"

services:
  zenoh-bridge:
    image: eclipse/zenoh-bridge-dds:1.8.0
    container_name: zenoh-dds-bridge
    network_mode: host
    command: ["-e", "${ZENOH_ENDPOINT}"]
    env_file:
      - .env
    
  g1pilot:
    image: tinsirius/g1:g1pilot-manipulation-hand
    container_name: g1pilot
    network_mode: host
    depends_on:
      - zenoh-bridge
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - G1_INTERFACE=${CONNECTION_IF}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID=1
      # GUI stuff
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=1
      - QT_OPENGL=software
    volumes:
      - /home/tinsirius/git/g1pilot:/ros2_ws/src/g1pilot
      - ./examples:/app/examples
      # GUI stuff
      - /tmp/.X11-unix:/tmp/.X11-unix:rw


