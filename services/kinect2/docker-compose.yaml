version: '3.8'

services:
  kinect_bridge:
    image: tinsirius/kinectv2:noetic
    container_name: kinect2_node
    network_mode: "host"
    privileged: true
    environment:
      # For GUI stuff
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=1
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - ./examples:/app/examples
      # For GUI stuff
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu] 
    command: >
      bash -c "source /root/kinect_ws/devel/setup.bash &&
               roslaunch /app/examples/kinect2_viewer.launch"

    # Use this instead if you simply want to launch the backend of the kinectv2
    # to publish to ROS and you don't need GUI env and volumes for this.
    # command: >
    #   bash -c "source /root/kinect_ws/devel/setup.bash &&
    #            roslaunch kinect2_bridge kinect2_bridge.launch"