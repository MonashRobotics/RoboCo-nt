services:
  moveit_sim:
    image: tinsirius/franka_ros_noetic:moveit_f4
    container_name: moveit-sim
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - PYTHONUNBUFFERED=1 # To prevent Python scripting printing not showing up on screen
      - LIBGL_ALWAYS_SOFTWARE=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command: >
      bash -c "source /home/moveit_ws/devel/setup.bash && roslaunch panda_moveit_config demo.launch"