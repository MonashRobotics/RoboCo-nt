services:
  realsense:
    image: tinsirius/realsense:noetic
    network_mode: "host"
    privileged: true
    container_name: realsense
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /run/udev:/run/udev:ro
      - /dev:/dev
      - ./config.yaml:/config.yaml
      - ./calib:/calib
    command: >
      bash -c "source /home/realsense_ws/devel/setup.bash &&
               rosrun rv_panda_realsense launch_file_generation.py &&
               roslaunch rv_panda_realsense monash_realsense.launch"