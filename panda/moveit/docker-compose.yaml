services:
  moveit-real:
    image: tinsirius/franka_ros_noetic:moveit_f4
    container_name: moveit-real
    network_mode: host
    privileged: true
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      rttime: -1
      memlock: 8428281856
    env_file:
      - .env
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - PYTHONUNBUFFERED=1
      - LIBGL_ALWAYS_SOFTWARE=1
      - REAL_ROBOT=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command: >
      bash -c "source /home/moveit_ws/devel/setup.bash && 
              roslaunch panda_moveit_config franka_control.launch robot_ip:=${ROBOT_IP}"